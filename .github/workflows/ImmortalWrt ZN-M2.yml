name: ImmortalWrt ZN-M2 构建器

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆源代码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 缓存 dl 和 ccache
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/dl
          ~/.ccache
        key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}
        restore-keys: |
          ${{ runner.os }}-openwrt-

    - name: 加载自定义 feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    # 添加 iStore 相关 feeds
    - name: 添加 iStore 源
      run: |
        cd openwrt
        # 添加 iStore 的 feeds 源
        echo "src-git istore https://github.com/linkease/istore.git" >> feeds.conf.default
        echo "src-git istoreUI https://github.com/linkease/istore-ui.git" >> feeds.conf.default
        # 添加 iStore 所需的依赖源
        echo "src-git nas https://github.com/linkease/nas-packages.git" >> feeds.conf.default
        echo "src-git nas_luci https://github.com/linkease/nas-packages-luci.git" >> feeds.conf.default

    # 添加 DDNS 相关 feeds（阿里云）
    - name: 添加 DDNS 阿里云源
      run: |
        cd openwrt
        # 添加阿里云 DDNS 插件源（如果官方源没有，可以添加第三方源）
        # 官方 DDNS 已包含阿里云支持，这里添加一些额外源确保可用
        echo "src-git ddns https://github.com/openwrt/packages.git" >> feeds.conf.default
        # 可选：添加额外的阿里云 DDNS 脚本源
        # echo "src-git aliddns https://github.com/kenzok8/openwrt-packages.git" >> feeds.conf.default

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # 配置软件包选项（iStore、DDNS 和 WiFi 相关）
    - name: 配置软件包选项
      run: |
        cd openwrt
        
        # iStore 相关配置
        echo "CONFIG_PACKAGE_luci-app-istore=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-istorex=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
        
        # DDNS 相关配置
        echo "CONFIG_PACKAGE_ddns-scripts=y" >> .config
        echo "CONFIG_PACKAGE_ddns-scripts_aliyun=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ddns=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y" >> .config
        
        # 阿里云 DDNS 额外脚本支持
        echo "CONFIG_PACKAGE_ddns-scripts-cloudflare=y" >> .config
        echo "CONFIG_PACKAGE_curl=y" >> .config
        echo "CONFIG_PACKAGE_openssl-util=y" >> .config
        
        # WiFi 基础配置
        echo "CONFIG_PACKAGE_kmod-cfg80211=y" >> .config
        echo "CONFIG_PACKAGE_kmod-mac80211=y" >> .config
        echo "CONFIG_PACKAGE_hostapd=y" >> .config
        echo "CONFIG_PACKAGE_hostapd-common=y" >> .config
        echo "CONFIG_PACKAGE_wpa-supplicant=y" >> .config
        echo "CONFIG_PACKAGE_iw=y" >> .config
        echo "CONFIG_PACKAGE_iwinfo=y" >> .config
        
        # WiFi 加密和认证
        echo "CONFIG_PACKAGE_wpad-basic=y" >> .config
        echo "CONFIG_PACKAGE_wpad-basic-openssl=y" >> .config
        
        # WiFi 管理工具
        echo "CONFIG_PACKAGE_luci-app-wifischedule=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-wifischedule-zh-cn=y" >> .config
        
        # 无线网卡驱动（高通/ath10k - ZN-M2 常见配置）
        echo "CONFIG_PACKAGE_kmod-ath=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ath10k=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ath10k-ct=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ath9k=y" >> .config
        echo "CONFIG_PACKAGE_ath10k-firmware-qca4019=y" >> .config
        echo "CONFIG_PACKAGE_ath10k-firmware-qca6174=y" >> .config
        echo "CONFIG_PACKAGE_ath10k-firmware-qca9377=y" >> .config
        echo "CONFIG_PACKAGE_ath10k-firmware-qca9887=y" >> .config
        echo "CONFIG_PACKAGE_ath10k-firmware-qca9888=y" >> .config
        echo "CONFIG_PACKAGE_ath10k-firmware-qca9984=y" >> .config
        
        # 其他无线驱动（可选）
        echo "CONFIG_PACKAGE_kootnet=$(cat /dev/null)" >> .config
        
        # WiFi 扫描和分析工具
        echo "CONFIG_PACKAGE_wavemon=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-wifimap=y" >> .config
        
        # 无线中继功能
        echo "CONFIG_PACKAGE_luci-app-wireguard=y" >> .config
        
        # 可选：添加 WiFi 调试工具
        echo "CONFIG_PACKAGE_tcpdump=y" >> .config
        echo "CONFIG_PACKAGE_tcpdump-mini=y" >> .config

    # 创建 WiFi 配置优化脚本（可选）
    - name: 优化 WiFi 配置
      run: |
        cd openwrt
        # 创建 files 目录用于预置配置文件
        mkdir -p files/etc/config
        
        # 优化无线配置参数
        cat > files/etc/config/wireless.optimize << 'EOF'
# WiFi 优化配置建议
# 将以下配置添加到 /etc/config/wireless 中

# 2.4GHz 优化配置
config wifi-device 'radio0'
        option type 'mac80211'
        option channel '1'  # 可选 1/6/11
        option hwmode '11g'
        option htmode 'HT40'
        option country 'CN'
        option legacy_rates '0'
        option txpower '20'
        option cell_density '0'

# 5GHz 优化配置
config wifi-device 'radio1'
        option type 'mac80211'
        option channel '149'  # 36-165 之间选择
        option hwmode '11a'
        option htmode 'VHT80'
        option country 'CN'
        option legacy_rates '0'
        option txpower '20'
        option cell_density '0'

# 安全配置建议
# WPA3 加密（需要设备支持）
config wifi-iface 'default_radio0'
        option device 'radio0'
        option network 'lan'
        option mode 'ap'
        option ssid 'OpenWrt_2.4G'
        option encryption 'sae-mixed'  # WPA2/WPA3 混合模式
        option key 'your_password_here'

config wifi-iface 'default_radio1'
        option device 'radio1'
        option network 'lan'
        option mode 'ap'
        option ssid 'OpenWrt_5G'
        option encryption 'sae-mixed'
        option key 'your_password_here'
EOF

        # 创建 WiFi 启动优化脚本
        mkdir -p files/etc/init.d
        cat > files/etc/init.d/wifi_optimize << 'EOF'
#!/bin/sh /etc/rc.common

START=99
STOP=10

start() {
    # 优化 WiFi 性能参数
    echo "Configuring WiFi optimizations..."
    
    # 禁用节能模式（提高性能）
    for dir in /sys/kernel/debug/ieee80211/*; do
        [ -f "$dir/ath10k/recv_amsdu" ] && echo 1 > "$dir/ath10k/recv_amsdu"
        [ -f "$dir/ath10k/recv_ampdu" ] && echo 1 > "$dir/ath10k/recv_ampdu"
    done
    
    # 重启无线网络
    wifi restart
    
    logger -t "wifi_optimize" "WiFi optimization completed"
}

stop() {
    echo "Resetting WiFi optimizations..."
}
EOF
        chmod +x files/etc/init.d/wifi_optimize

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) 线程编译"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理文件
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到发布
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body: |
          ImmortalWrt ZN-M2 固件 (基于 openwrt-24.10 分支)
          - 基于官方 immortalwrt openwrt-24.10 分支构建
          - 包含 iStore 应用商店
          - 包含 DDNS 动态域名解析
          - 包含阿里云 DDNS 脚本支持
          - 包含 luci-app-ddns 中文界面
          - 包含完整 WiFi 驱动支持（高通 ath10k/ath9k 等）
          - 包含 WiFi 管理工具和优化脚本
          - 支持 2.4GHz 和 5GHz 双频
          - 支持 WPA3 加密
        files: ${{ env.FIRMWARE }}/*

    - name: 删除工作流运行记录
      uses: Mattraks/delete-workflow-runs@v2
      if: (!cancelled())
      with:
        retain_days: 7
        keep_minimum_runs: 3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 删除旧版本发布
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
