name: Build ZN-M2 ImmortalWrt 24.10.x

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt

    - name: Update feeds
      working-directory: openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add full ZN-M2 device support
      working-directory: openwrt
      run: |
        # ============================================================
        # 1. 创建 DTS 设备树文件
        # ============================================================
        mkdir -p target/linux/qualcommax/dts
        cat > target/linux/qualcommax/dts/ipq6000-zn-m2.dts << 'DTS_EOF'
        // SPDX-License-Identifier: GPL-2.0-or-later OR MIT
        /dts-v1/;
        #include "ipq6018-512m.dtsi"
        #include "ipq6018-ess.dtsi"
        #include <dt-bindings/gpio/gpio.h>
        #include <dt-bindings/input/input.h>
        
        / {
            model = "ZN M2";
            compatible = "zn,m2", "qcom,ipq6018";
            
            aliases {
                serial0 = &blsp1_uart3;
                led-boot = &led_power;
                led-failsafe = &led_power;
                led-running = &led_power;
                ethernet0 = &dp1;
                ethernet1 = &dp2;
                ethernet3 = &dp4;
                ethernet4 = &dp5;
            };
            
            chosen {
                stdout-path = "serial0:115200n8";
            };
            
            keys {
                compatible = "gpio-keys";
                reset {
                    label = "reset";
                    gpios = <&tlmm 60 GPIO_ACTIVE_LOW>;
                    linux,code = <KEY_RESTART>;
                };
                wps {
                    label = "wps";
                    gpios = <&tlmm 9 GPIO_ACTIVE_LOW>;
                    linux,code = <KEY_WPS_BUTTON>;
                };
            };
            
            leds {
                compatible = "gpio-leds";
                led_power: power {
                    label = "blue:power";
                    gpios = <&tlmm 58 GPIO_ACTIVE_HIGH>;
                };
                mesh {
                    label = "blue:mesh";
                    gpios = <&tlmm 73 GPIO_ACTIVE_HIGH>;
                };
                lan {
                    label = "blue:lan";
                    gpios = <&tlmm 74 GPIO_ACTIVE_HIGH>;
                };
                wan {
                    label = "blue:wan";
                    gpios = <&tlmm 37 GPIO_ACTIVE_HIGH>;
                };
                wlan5g {
                    label = "blue:wlan5g";
                    gpios = <&tlmm 35 GPIO_ACTIVE_HIGH>;
                };
                wlan2g {
                    label = "blue:wlan2g";
                    gpios = <&tlmm 70 GPIO_ACTIVE_HIGH>;
                };
            };
        };
        
        &tlmm { gpio-reserved-ranges = <20 1>; };
        &blsp1_uart3 { status = "okay"; };
        &crypto { status = "okay"; };
        &cryptobam { status = "okay"; };
        &prng { status = "okay"; };
        &qpic_bam { status = "okay"; };
        &qusb_phy_0 { status = "okay"; };
        &ssphy_0 { status = "okay"; };
        &usb3 { status = "okay"; };
        
        &mdio {
            status = "okay";
            reset-gpios = <&tlmm 75 GPIO_ACTIVE_LOW>;
            ethernet-phy-package@0 {
                compatible = "qcom,qca8075-package";
                #address-cells = <1>;
                #size-cells = <0>;
                reg = <0>;
                qca8075_0: ethernet-phy@0 { reg = <0>; };
                qca8075_1: ethernet-phy@1 { reg = <1>; };
                qca8075_3: ethernet-phy@3 { reg = <3>; };
                qca8075_4: ethernet-phy@4 { reg = <4>; };
            };
        };
        
        &switch {
            status = "okay";
            switch_lan_bmp = <(ESS_PORT1 | ESS_PORT2 | ESS_PORT4)>;
            switch_wan_bmp = <ESS_PORT5>;
            switch_mac_mode = <MAC_MODE_PSGMII>;
        };
        
        &qpic_nand { status = "okay"; };
        
        &dp1 { status = "okay"; phy-handle = <&qca8075_0>; label = "lan3"; };
        &dp2 { status = "okay"; phy-handle = <&qca8075_1>; label = "lan2"; };
        &dp4 { status = "okay"; phy-handle = <&qca8075_3>; label = "lan1"; };
        &dp5 { status = "okay"; phy-handle = <&qca8075_4>; label = "wan"; };
        
        &edma { status = "okay"; };
        &wifi { status = "okay"; };
        DTS_EOF
        
        # ============================================================
        # 2. 添加到 ipq60xx.mk 编译配置
        # ============================================================
        cat >> target/linux/qualcommax/image/ipq60xx.mk << 'MK_EOF'
        
        define Device/zn_m2
          $(call Device/FitImage)
          $(call Device/UbiFit)
          DEVICE_VENDOR := ZN
          DEVICE_MODEL := M2
          BLOCKSIZE := 128k
          PAGESIZE := 2048
          SOC := ipq6000
          DEVICE_DTS := ipq6000-zn-m2
          DEVICE_PACKAGES := ipq-wifi-zn_m2
        endef
        TARGET_DEVICES += zn_m2
        MK_EOF
        
        # ============================================================
        # 3. 注册 WiFi 固件到 ipq-wifi Makefile
        # ============================================================
        WIFI_MK="package/firmware/ipq-wifi/Makefile"
        if ! grep -q "zn_m2" "$WIFI_MK"; then
            sed -i '/^[[:space:]]*zyxel_scr50axe[[:space:]]*$/s/[[:space:]]*$/ \\/' "$WIFI_MK"
            sed -i '/zyxel_scr50axe.*\\/a\\\tzn_m2' "$WIFI_MK"
            sed -i '/generate-ipq-wifi-package,zyxel_scr50axe/a\$(eval $(call generate-ipq-wifi-package,zn_m2,ZN M2))' "$WIFI_MK"
        fi
        
        # ============================================================
        # 4. 复制 WiFi 校准文件（从项目 files 目录）
        # ============================================================
        BOARD_FILE="package/firmware/ipq-wifi/board-zn_m2.ipq6018"
        if [ -f "$GITHUB_WORKSPACE/files/board-zn_m2.ipq6018" ]; then
            cp "$GITHUB_WORKSPACE/files/board-zn_m2.ipq6018" "$BOARD_FILE"
            echo "WiFi board file copied from workspace ($(wc -c < "$BOARD_FILE") bytes)"
        else
            echo "ERROR: WiFi board file not found in files/board-zn_m2.ipq6018"
            exit 1
        fi
        
        # ============================================================
        # 5. 添加网络配置（定义 LAN/WAN 端口）
        # ============================================================
        NETWORK_FILE="target/linux/qualcommax/ipq60xx/base-files/etc/board.d/02_network"
        if [ -f "$NETWORK_FILE" ] && ! grep -q "zn,m2" "$NETWORK_FILE"; then
            sed -i '0,/qihoo,360v6)/{/qihoo,360v6)/i\\\tzn,m2|\\' "$NETWORK_FILE"
        fi
        
        # ============================================================
        # 6. 添加系统升级支持
        # ============================================================
        PLATFORM_FILE="target/linux/qualcommax/ipq60xx/base-files/lib/upgrade/platform.sh"
        if [ -f "$PLATFORM_FILE" ] && ! grep -q "zn,m2" "$PLATFORM_FILE"; then
            sed -i '/glinet,gl-ax1800/i\\\tzn,m2|\\' "$PLATFORM_FILE"
        fi
        
        # ============================================================
        # 7. 添加 WiFi 校准数据热插拔脚本（修复 sed 语法）
        # ============================================================
        CALDATA_FILE="target/linux/qualcommax/ipq60xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata"
        if [ -f "$CALDATA_FILE" ] && ! grep -q "zn,m2" "$CALDATA_FILE"; then
            # 使用 a 命令追加，避免大括号转义问题
            sed -i '/qihoo,360v6)/a\\\tzn,m2)\n\t\tcaldata_extract "0:art" 0x1000 0x10000\n\t\t;;' "$CALDATA_FILE"
        fi
        
        echo "Full ZN-M2 support added successfully"

    - name: Configure firmware
      working-directory: openwrt
      run: |
        echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
        echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_zn_m2=y" >> .config
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-ssl-openssl=y" >> .config
        make defconfig

    - name: Download packages
      working-directory: openwrt
      run: |
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      id: compile
      working-directory: openwrt
      run: |
        make -j$(nproc)
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: zn-m2-firmware
        path: openwrt/bin/targets/*/*
